<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Left accent stripe -->
  <rect x="80" y="70" width="4" height="580" fill="#3B82F6"/>

  <!-- Subtle geometric decoration top right -->
  <circle cx="1150" cy="120" r="60" fill="#3B82F6" fill-opacity="0.08"/>
  <rect x="1080" y="180" width="80" height="80" fill="#3B82F6" fill-opacity="0.08"/>

  <!-- Chapter title -->
  <text x="112" y="320" font-size="48" font-weight="bold" fill="#111827">
    <tspan>{{CHAPTER_TITLE}}</tspan>
  </text>
  <text x="112" y="360" font-size="20" fill="#6B7280">
    <tspan>{{CHAPTER_DESC}}</tspan>
  </text>
</svg>
