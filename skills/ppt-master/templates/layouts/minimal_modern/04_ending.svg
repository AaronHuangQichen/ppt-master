<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Left accent stripe -->
  <rect x="80" y="70" width="4" height="580" fill="#3B82F6"/>

  <!-- Subtle decoration bottom right -->
  <circle cx="1140" cy="580" r="80" fill="#3B82F6" fill-opacity="0.06"/>
  <circle cx="1180" cy="540" r="40" fill="#3B82F6" fill-opacity="0.08"/>

  <!-- Thank You -->
  <text x="112" y="330" font-size="56" font-weight="bold" fill="#111827">
    <tspan>{{THANK_YOU}}</tspan>
  </text>
  <text x="112" y="370" font-size="20" fill="#6B7280">
    <tspan>{{TAGLINE}}</tspan>
  </text>

  <!-- Contact info -->
  <rect x="112" y="450" width="400" height="120" rx="12" fill="#F9FAFB" />
  <text x="140" y="490" font-size="16" fill="#4B5563">
    <tspan>{{CONTACT_INFO}}</tspan>
  </text>
</svg>
