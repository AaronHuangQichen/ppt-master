<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <filter id="softShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="3" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.05" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Title centered at top -->
  <text x="640" y="120" text-anchor="middle" font-size="36" font-weight="normal" fill="#4a4a48" font-family="SF Pro Display, PingFang SC, Microsoft YaHei, sans-serif">
    <tspan>Contents</tspan>
  </text>

  <!-- Accent dot under title -->
  <circle cx="640" cy="160" r="8" fill="{{ACCENT_COLOR}}"/>

  <!-- TOC content card -->
  <rect x="320" y="208" width="640" height="400" rx="16" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1" stroke-opacity="0.5" filter="url(#softShadow)"/>

  <!-- TOC items go here - large vertical spacing between items, centered -->
  <!-- Executor places each item with 48px spacing -->

  <!-- Footer page number -->
  <text x="640" y="690" text-anchor="middle" font-size="10" fill="#adb5bd" font-family="SF Pro Display, PingFang SC, Microsoft YaHei, sans-serif">
    <tspan>{{PAGE_NUM}}</tspan>
  </text>
</svg>
