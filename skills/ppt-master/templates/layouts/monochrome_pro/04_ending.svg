<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Black background -->
  <rect width="1280" height="720" fill="#000000"/>

  <!-- Accent square decoration -->
  <rect x="80" y="80" width="64" height="64" fill="{{ACCENT_COLOR}}"/>

  <!-- Centered Thank You -->
  <text x="640" y="340" text-anchor="middle" font-size="72" font-weight="900" fill="#FFFFFF" font-family="SF Pro Display, PingFang SC, Microsoft YaHei, sans-serif">
    <tspan>{{THANK_YOU}}</tspan>
  </text>

  <!-- Contact info -->
  <text x="640" y="400" text-anchor="middle" font-size="18" fill="#AAAAAA" font-family="SF Pro Display, PingFang SC, Microsoft YaHei, sans-serif">
    <tspan>{{CONTACT}}</tspan>
  </text>

  <!-- Bottom-right accent corner -->
  <rect x="1216" y="640" width="64" height="64" fill="{{ACCENT_COLOR}}"/>
</svg>
