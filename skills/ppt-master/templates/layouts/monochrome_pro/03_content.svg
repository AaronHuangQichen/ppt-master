<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Top-left page title -->
  <text x="80" y="72" font-size="40" font-weight="bold" fill="#000000" font-family="SF Pro Display, PingFang SC, Microsoft YaHei, sans-serif">
    <tspan>{{PAGE_TITLE}}</tspan>
  </text>

  <!-- Horizontal accent line -->
  <rect x="80" y="96" width="200" height="3" fill="{{ACCENT_COLOR}}"/>

  <!-- Content grid area starts at y=128 -->
  <!-- Content cards go here with strict 8px grid alignment -->
  <!-- Each card: white background, 1px #AAAAAA border, sharp corners -->

  <!-- Footer -->
  <text x="80" y="690" font-size="10" fill="#AAAAAA" font-family="SF Pro Display, PingFang SC, Microsoft YaHei, sans-serif">
    <tspan>{{SECTION_NAME}}</tspan>
  </text>
  <text x="1200" y="690" text-anchor="end" font-size="10" fill="#AAAAAA" font-family="SF Pro Display, PingFang SC, Microsoft YaHei, sans-serif">
    <tspan>{{PAGE_NUM}}</tspan>
  </text>
</svg>
