<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Left accent stripe with accent color -->
  <rect x="80" y="80" width="4" height="560" fill="{{ACCENT_COLOR}}"/>

  <!-- Main title - left aligned -->
  <text x="128" y="280" font-size="64" font-weight="900" fill="#000000" font-family="SF Pro Display, PingFang SC, Microsoft YaHei, sans-serif">
    <tspan>{{TITLE}}</tspan>
  </text>

  <!-- Subtitle -->
  <text x="128" y="344" font-size="24" fill="#555555" font-family="SF Pro Display, PingFang SC, Microsoft YaHei, sans-serif">
    <tspan>{{SUBTITLE}}</tspan>
  </text>

  <!-- Horizontal divider -->
  <rect x="128" y="384" width="400" height="2" fill="#000000"/>

  <!-- Author and date -->
  <text x="128" y="440" font-size="16" fill="#555555" font-family="SF Pro Display, PingFang SC, Microsoft YaHei, sans-serif">
    <tspan>{{AUTHOR}}</tspan>
  </text>
  <text x="128" y="472" font-size="14" fill="#AAAAAA" font-family="SF Pro Display, PingFang SC, Microsoft YaHei, sans-serif">
    <tspan>{{DATE}}</tspan>
  </text>
</svg>
