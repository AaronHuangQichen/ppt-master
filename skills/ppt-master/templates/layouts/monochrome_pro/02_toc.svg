<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Title at top left -->
  <text x="80" y="88" font-size="40" font-weight="bold" fill="#000000" font-family="SF Pro Display, PingFang SC, Microsoft YaHei, sans-serif">
    <tspan>Contents</tspan>
  </text>

  <!-- Vertical connecting line for TOC items -->
  <rect x="104" y="144" width="1" height="448" fill="#AAAAAA"/>

  <!-- TOC items go here -->
  <!-- Executor fills each item in grid: circle marker + number + title -->
  <!-- Template shows structure - each item spaced at 64px intervals -->

  <!-- Footer -->
  <text x="80" y="690" font-size="10" fill="#AAAAAA" font-family="SF Pro Display, PingFang SC, Microsoft YaHei, sans-serif">
    <tspan>{{PAGE_NUM}}</tspan>
  </text>
</svg>
