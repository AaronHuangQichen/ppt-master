<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <filter id="softShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.08" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Top crimson bar with page title -->
  <rect x="0" y="0" width="1280" height="60" fill="#8B0000"/>
  <text x="80" y="32" font-size="32" font-weight="bold" fill="#FFFFFF" font-family="SF Pro Display, PingFang SC, Microsoft YaHei, sans-serif">
    <tspan>{{PAGE_TITLE}}</tspan>
  </text>

  <!-- Content area starts at y=70 -->
  <!-- Cards go here with soft shadow as defined in component spec -->

  <!-- Footer -->
  <text x="80" y="688" font-size="10" fill="#999999" font-family="SF Pro Display, PingFang SC, Microsoft YaHei, sans-serif">
    <tspan>{{SECTION_NAME}}</tspan>
  </text>
  <text x="1200" y="688" text-anchor="end" font-size="10" fill="#999999" font-family="SF Pro Display, PingFang SC, Microsoft YaHei, sans-serif">
    <tspan>{{PAGE_NUM}}</tspan>
  </text>
</svg>
